# Render Blueprint
# This file can be used to deploy the entire Inventra stack on Render.
# Simply create a new "Blueprint Instance" in Render Dashboard and select this repo.

services:
  # --------------------------------------------------------------------------------
  # 1. BACKEND (Express + Prisma)
  # --------------------------------------------------------------------------------
  - type: web
    name: inventra-backend
    region: oregon
    plan: free
    runtime: node
    buildCommand: npm install && npm run build --workspace=backend
    startCommand: npx prisma migrate deploy --schema=backend/prisma/schema.prisma && npm start --workspace=backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://postgres.bapjpnvndyfvsbhfrpyy:LZ%23%3FFka%2BC_Yr8%2Aj@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?pgbouncer=true
      - key: DIRECT_URL
        value: postgresql://postgres.bapjpnvndyfvsbhfrpyy:LZ%23%3FFka%2BC_Yr8%2Aj@aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: https://inventra-frontend.onrender.com # Update after frontend is created
      # Secrets (Set these in Dashboard manually later if needed, or use sync: false)
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: inventra-ai
          property: hostport
      - key: AI_SERVICE_API_KEY
        sync: false # Set manually
      - key: GEMINI_API_KEY
        sync: false

  # --------------------------------------------------------------------------------
  # 2. AI SERVICE (Express + OpenAI)
  # --------------------------------------------------------------------------------
  - type: web
    name: inventra-ai
    region: oregon
    plan: free
    runtime: node
    buildCommand: npm install && npm run build --workspace=ai-service
    startCommand: npm start --workspace=ai-service
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://postgres.bapjpnvndyfvsbhfrpyy:LZ%23%3FFka%2BC_Yr8%2Aj@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?pgbouncer=true
      - key: API_KEY
        sync: false # Must match AI_SERVICE_API_KEY in backend
      - key: OPENAI_API_KEY
        sync: false

  # --------------------------------------------------------------------------------
  # 3. FRONTEND (Next.js)
  # --------------------------------------------------------------------------------
  - type: web
    name: inventra-frontend
    region: oregon
    plan: free
    runtime: node
    buildCommand: npm install && npm run build --workspace=frontend
    startCommand: npm start --workspace=frontend
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: inventra-backend
          property: hostport
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
